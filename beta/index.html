<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join the Kidence Family Beta</title>
    <meta name="description" content="Join the Kidence family beta — a kid-friendly wristband and parent coaching app for tantrums, meltdowns, and big feelings.">
    <link rel="icon" type="image/png" href="../favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'kidence-bg': '#FDFCFB',
                        'kidence-offwhite': '#F5F2F0',
                        'kidence-dark': '#2D2926',
                        'kidence-muted': '#6B6661',
                        'kidence-accent': '#D4A373',
                        'kidence-accent-hover': '#BC8A5F',
                        'kidence-pastel-blue': '#E3E9F2',
                        'kidence-pastel-peach': '#F9EBE0',
                        'kidence-pastel-mint': '#E8F3F1',
                        'kidence-pastel-lilac': '#EDE9F6',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        .field {
            width: 100%;
            padding: 0.8rem 1.1rem;
            background: white;
            border: 1.5px solid #F5F2F0;
            border-radius: 1rem;
            font-size: 0.9rem;
        }
        .field:focus { outline: none; border-color: #D4A373; }
        .pill {
            padding: 0.6rem 1rem;
            border-radius: 9999px;
            border: 1.5px solid #F5F2F0;
            background: white;
            font-size: 0.85rem;
            font-weight: 500;
            color: #2D2926;
            cursor: pointer;
            transition: all .15s;
            user-select: none;
        }
        .pill:hover { border-color: #D4A373; }
        .pill.on {
            background: #D4A373;
            border-color: #D4A373;
            color: white;
        }
        .hp-field { position: absolute; left: -9999px; top: -9999px; height: 0; width: 0; overflow: hidden; }
    </style>
</head>
<body class="bg-kidence-bg text-kidence-dark font-sans selection:bg-kidence-accent selection:text-white">

    <nav class="container mx-auto px-6 py-5 flex items-center justify-between">
        <a href="../" class="font-display text-2xl font-semibold tracking-tight">kidence</a>
        <button id="lang-toggle" onclick="toggleLang()" class="px-4 py-2 rounded-full border-1.5 border border-kidence-offwhite bg-white text-sm font-medium hover:border-kidence-accent transition">中文</button>
    </nav>

    <main class="container mx-auto px-6 pb-24 max-w-2xl">
        <!-- Intro -->
        <header class="pt-8 pb-10 space-y-4">
            <span class="inline-block px-4 py-1.5 text-xs font-semibold tracking-widest uppercase bg-kidence-pastel-lilac rounded-full" data-t="badge"></span>
            <h1 class="font-display text-4xl md:text-5xl font-light tracking-tight" data-t="title"></h1>
            <p class="text-kidence-muted leading-relaxed" data-t="intro"></p>
            <p class="text-xs text-kidence-muted" data-t="disclaimer"></p>
        </header>

        <!-- Success -->
        <section id="success" class="hidden bg-white rounded-3xl p-10 text-center space-y-4 shadow-sm">
            <div class="text-5xl">🎉</div>
            <h2 class="font-display text-3xl font-light" data-t="thanksTitle"></h2>
            <p class="text-kidence-muted" data-t="thanksBody"></p>
            <p class="font-mono text-sm text-kidence-accent">kidence.ai/beta</p>
        </section>

        <!-- Form (rendered by JS) -->
        <form id="beta-form" novalidate class="space-y-10">
            <div class="hp-field" aria-hidden="true">
                <label>Website <input type="text" id="hp-website" tabindex="-1" autocomplete="off"></label>
            </div>
            <div id="essentials"></div>
            <div class="pt-2">
                <h2 class="font-display text-2xl font-light mb-1" data-t="optionalTitle"></h2>
                <p class="text-sm text-kidence-muted mb-6" data-t="optionalHint"></p>
                <div id="optional"></div>
            </div>
            <div class="space-y-5">
                <p id="form-error" class="hidden text-sm text-red-700 bg-red-50 rounded-2xl px-5 py-3"></p>
                <p class="text-xs text-kidence-muted leading-relaxed" data-t="consent"></p>
                <button id="submit-btn" type="submit" class="w-full sm:w-auto px-10 py-4 bg-kidence-dark text-white rounded-full font-medium shadow-xl hover:bg-kidence-accent transition-all">
                    <span data-t="submit"></span>
                </button>
            </div>
        </form>
    </main>

    <footer class="container mx-auto px-6 pb-10 text-center text-xs text-kidence-muted" data-t="footer"></footer>

    <script>
        // ── Supabase (public insert-only; RLS blocks all reads) ─────────

        // ── i18n ─────────────────────────────────────────────────────────
        const T = {
            en: {

                otherPlaceholder: 'Tell us more…',

                errRequired: 'Please fill in all required fields (marked \'required\').',

            zh: {

                intro: '一只孩子愿意戴的小手环 + 一个帮你接住孩子大情绪的 App——发脾气、崩溃大哭的当下,告诉你该说什么、做什么。必填部分一分钟填完,其余选填,每一题都能帮我们把产品做对。',
                disclaimer: '本产品不是医疗器械、诊断工具或治疗服务。',
                optionalTitle: '帮我们做得更好',
                optionalHint: '以下全部选填,想答哪题答哪题。',
                consent: '提交即表示同意 Kidence 就内测事宜与您联系。这是早期研究/内测产品,不构成医疗、诊断或治疗服务。',
                submit: '加入内测等候名单',
                thanksTitle: '登记成功!',
                thanksBody: '内测名额开放时我们会邮件联系您。身边有同样在"渡劫"的家长?把这个页面分享给 TA,对我们帮助很大。',
                footer: '© 2026 Kidence',
                required: '必填', optional: '选填', selectAll: '可多选',
                otherPlaceholder: '再说两句…',
                childN: '孩子', agePlaceholder: '年龄段…', ageOptional: '年龄(选填)…', addChild: '+ 再加一个孩子',
                errRequired: '请完成所有标注"必填"的题目。',
                errChild1: '请至少选择孩子 1 的年龄段。',
                errSubmit: '提交失败,请重试,或发邮件到 hello@kidence.ai。',
                q: {
                    name: '您的称呼', email: '邮箱', age: '孩子年龄',
                    beta: '想参加为期两周的内测吗?',
                    betaNote: '免费获得手环和 App 两周的早期使用权,您的反馈直接决定我们做什么。符合条件的家庭我们会联系并说明细节。',
                    situations: '现在哪些场景最难熬?',
                    frequency: '难熬的时刻多久来一次?',
                    wearable: '愿意让孩子戴一只轻便手环吗?',
                    logging: '愿意在事后花 1 分钟记录一下吗?',
                    outcomes: '什么样的效果会让您一直用下去?',
                    payment: '如果确实有效,愿意付费吗?',
                    phone: '电话', location: '国家和省/州',
                    notes: '还有什么想告诉我们?',
                },
            },
        };

        const OPT = {
            age: [
                { v: '2-3', en: '2–3', zh: '2–3 岁' }, { v: '4-5', en: '4–5', zh: '4–5 岁' },
                { v: '6-7', en: '6–7', zh: '6–7 岁' }, { v: '8-10', en: '8–10', zh: '8–10 岁' },
                { v: '11-12', en: '11–12', zh: '11–12 岁' }, { v: 'multiple', en: 'Multiple children', zh: '多个孩子' },
            ],
            beta: [
                { v: 'yes_asap', en: 'Yes, ASAP', zh: '想,越快越好' }, { v: 'yes_later', en: 'Yes, but later', zh: '想,但晚一点' },
                { v: 'maybe', en: 'Maybe', zh: '再想想' }, { v: 'not_now', en: 'Not right now', zh: '暂时不了' },
            ],
            situations: [
                { v: 'Tantrums / meltdowns', en: 'Tantrums / meltdowns', zh: '发脾气/崩溃大哭' },
                { v: 'Anger or frustration', en: 'Anger & frustration', zh: '愤怒与挫败' },
                { v: 'Homework struggles', en: 'Homework', zh: '写作业' },
                { v: 'Bedtime battles', en: 'Bedtime', zh: '睡觉大战' },
                { v: 'Morning routine', en: 'Mornings', zh: '早上出门' },
                { v: 'Screen time transitions', en: 'Ending screen time', zh: '停止看屏幕' },
                { v: 'Sibling conflict', en: 'Sibling conflict', zh: '兄弟姐妹吵架' },
                { v: 'Separation anxiety / drop-off', en: 'Drop-off / separation', zh: '分离焦虑' },
                { v: 'Sensory overwhelm', en: 'Sensory overwhelm', zh: '感官过载' },
                { v: 'Anxiety / worries', en: 'Anxiety / worries', zh: '焦虑担忧' },
                { v: 'Other', en: 'Other', zh: '其他' },
            ],
            frequency: [
                { v: 'multiple_daily', en: 'Several times a day', zh: '一天好几次' },
                { v: 'daily', en: 'About daily', zh: '差不多每天' },
                { v: 'few_weekly', en: 'A few times a week', zh: '一周几次' },
                { v: 'weekly', en: 'About weekly', zh: '一周一次' },
                { v: 'less', en: 'Less often', zh: '更少' },
            ],
            wearable: [
                { v: 'yes', en: 'Yes', zh: '愿意' }, { v: 'maybe', en: 'Maybe', zh: '可能' },
                { v: 'no', en: 'No', zh: '不愿意' }, { v: 'learn_more', en: 'Tell me more first', zh: '先了解一下' },
            ],
            logging: [
                { v: 'yes', en: 'Yes', zh: '愿意' }, { v: 'maybe', en: 'Maybe', zh: '可能' }, { v: 'no', en: 'No', zh: '不愿意' },
            ],
            outcomes: [
                { v: 'Earlier warning before a meltdown', en: 'Earlier warning', zh: '提前预警' },
                { v: 'Help knowing what to say in the moment', en: 'What to say in the moment', zh: '当下知道说什么' },
                { v: 'Shorter tantrums / meltdowns', en: 'Shorter meltdowns', zh: '崩溃时间变短' },
                { v: 'Better understanding of triggers', en: 'Understanding triggers', zh: '搞懂诱因' },
                { v: 'Less yelling or parent stress', en: 'Less yelling / stress', zh: '少吼、少内耗' },
                { v: 'Better bedtime / morning routine', en: 'Smoother routines', zh: '日常更顺' },
                { v: 'Better sibling conflict support', en: 'Sibling peace', zh: '兄弟姐妹少吵架' },
                { v: 'Better child self-regulation skills', en: 'Kid self-regulation', zh: '孩子学会自我调节' },
                { v: 'Other', en: 'Other', zh: '其他' },
            ],
            payment: [
                { v: 'yes_10_15', en: 'Yes, $10–15/mo', zh: '愿意,$10–15/月' },
                { v: 'yes_15_25', en: 'Yes, $15–25/mo', zh: '愿意,$15–25/月' },
                { v: 'device_only', en: 'One-time device only', zh: '只买断设备' },
                { v: 'maybe', en: 'Maybe', zh: '再看看' }, { v: 'no', en: 'No', zh: '不愿意' },
            ],
        };

        // ── State ────────────────────────────────────────────────────────
        let lang = localStorage.getItem('kidence.lang') ||
            (new URLSearchParams(location.search).get('lang') === 'zh' ? 'zh' : 'en');
        const S = {
            parent_name: '', email: '', child_age_range: null, beta_interest: null,
            hard_situations: [], hard_situations_other: '', episode_frequency: null,
            wearable_willingness: null, logging_willingness: null,
            valuable_outcomes: [], valuable_outcomes_other: '',
            payment_willingness: null, phone: '', country: '', state_region: '',
            additional_notes: '', children_ages: ['', ''],
        };

        const t = (k) => T[lang][k];
        const esc = (x) => x.replace(/&/g, '&amp;').replace(/</g, '&lt;');

        function tag(txt, req) {
            return `<span class="text-[10px] font-semibold uppercase tracking-wider px-2 py-0.5 rounded-full ${req ? 'bg-kidence-pastel-peach text-kidence-accent-hover' : 'bg-kidence-offwhite text-kidence-muted'}">${txt}</span>`;
        }
        function qhead(label, req, hint) {
            return `<div class="flex items-center gap-2 mb-3"><label class="font-display text-lg font-medium">${label}</label>${tag(req ? t('required') : t('optional'), req)}${hint ? `<span class="text-xs text-kidence-muted">· ${hint}</span>` : ''}</div>`;
        }
        function pills(field, options, multi) {
            const cur = S[field];
            return `<div class="flex flex-wrap gap-2">` + options.map((o) => {
                const on = multi ? cur.includes(o.v) : cur === o.v;
                return `<button type="button" class="pill ${on ? 'on' : ''}" onclick="pick('${field}','${o.v.replace(/'/g, "\\'")}',${multi})">${o[lang]}</button>`;
            }).join('') + `</div>`;
        }
        function textInput(field, type, placeholder) {
            return `<input class="field" type="${type}" value="${esc(S[field])}" placeholder="${placeholder || ''}" oninput="S['${field}']=this.value">`;
        }

        function childrenAgesBlock() {
            if (S.child_age_range !== 'multiple') return '';
            const rows = S.children_ages.map((val, i) => `
                <div class="flex items-center gap-3">
                    <span class="text-sm text-kidence-muted w-16">${t('childN')} ${i + 1}</span>
                    <select class="field" style="flex:1" onchange="S.children_ages[${i}]=this.value; ">
                        <option value="">${i === 0 ? t('agePlaceholder') : t('ageOptional')}</option>
                        ${OPT.age.slice(0, 5).map((o) => `<option value="${o.v}" ${val === o.v ? 'selected' : ''}>${o[lang]}</option>`).join('')}
                    </select>
                </div>`).join('');
            return `<div class="space-y-2 mt-3">${rows}${S.children_ages.length < 6 ? `<button type="button" class="text-sm text-kidence-accent underline underline-offset-4" onclick="S.children_ages.push(''); render()">${t('addChild')}</button>` : ''}</div>`;
        }

        function render() {
            document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
            document.getElementById('lang-toggle').textContent = lang === 'zh' ? 'EN' : '中文';
            document.querySelectorAll('[data-t]').forEach((el) => (el.textContent = t(el.dataset.t)));

            document.getElementById('essentials').innerHTML = `
                <div class="space-y-7">
                    <div>${qhead(t('q').name, true)}${textInput('parent_name', 'text')}</div>
                    <div>${qhead(t('q').email, true)}${textInput('email', 'email', 'you@example.com')}</div>
                    <div>${qhead(t('q').age, true)}${pills('child_age_range', OPT.age, false)}${childrenAgesBlock()}</div>
                    <div>${qhead(t('q').frequency, true)}${pills('episode_frequency', OPT.frequency, false)}</div>
                    <div>${qhead(t('q').wearable, true)}${pills('wearable_willingness', OPT.wearable, false)}</div>
                    <div>${qhead(t('q').payment, true)}${pills('payment_willingness', OPT.payment, false)}</div>
                    <div>${qhead(t('q').beta, true)}<p class="text-xs text-kidence-muted -mt-1 mb-3 leading-relaxed max-w-lg">${t('q').betaNote}</p>${pills('beta_interest', OPT.beta, false)}</div>
                </div>`;

            document.getElementById('optional').innerHTML = `
                <div class="space-y-7">
                    <div>${qhead(t('q').situations, false, t('selectAll'))}${pills('hard_situations', OPT.situations, true)}
                        ${S.hard_situations.includes('Other') ? `<div class="mt-2">${textInput('hard_situations_other', 'text', t('otherPlaceholder'))}</div>` : ''}</div>
                    <div>${qhead(t('q').logging, false)}${pills('logging_willingness', OPT.logging, false)}</div>
                    <div>${qhead(t('q').outcomes, false, t('selectAll'))}${pills('valuable_outcomes', OPT.outcomes, true)}
                        ${S.valuable_outcomes.includes('Other') ? `<div class="mt-2">${textInput('valuable_outcomes_other', 'text', t('otherPlaceholder'))}</div>` : ''}</div>
                    <div>${qhead(t('q').phone, false)}${textInput('phone', 'tel')}</div>
                    <div>${qhead(t('q').location, false)}<div class="grid grid-cols-2 gap-3">${textInput('country', 'text')}${textInput('state_region', 'text')}</div></div>
                    <div>${qhead(t('q').notes, false)}<textarea class="field" rows="3" oninput="S.additional_notes=this.value">${esc(S.additional_notes)}</textarea></div>
                </div>`;
        }

        function pick(field, value, multi) {
            if (multi) {
                const list = S[field];
                S[field] = list.includes(value) ? list.filter((v) => v !== value) : [...list, value];
            } else {
                S[field] = S[field] === value ? null : value;
            }
            render();
        }

        function toggleLang() {
            lang = lang === 'en' ? 'zh' : 'en';
            localStorage.setItem('kidence.lang', lang);
            render();
        }

        function showError(msg) {
            const el = document.getElementById('form-error');
            el.textContent = msg;
            el.classList.remove('hidden');
            el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        document.getElementById('beta-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            document.getElementById('form-error').classList.add('hidden');

            if (!S.parent_name.trim() || !/.+@.+\..+/.test(S.email.trim()) || !S.child_age_range || !S.episode_frequency || !S.wearable_willingness || !S.payment_willingness || !S.beta_interest) {
                showError(t('errRequired'));
                return;
            }
            const ages = S.children_ages.filter(Boolean);
            if (S.child_age_range === 'multiple' && ages.length === 0) {
                showError(t('errChild1'));
                return;
            }
            if (document.getElementById('hp-website').value) { showSuccess(); return; }

            const payload = {
                parent_name: S.parent_name.trim(),
                email: S.email.trim(),
                phone: S.phone.trim() || null,
                country: S.country.trim() || null,
                state_region: S.state_region.trim() || null,
                child_age_range: S.child_age_range,
                hard_situations: S.hard_situations,
                hard_situations_other: S.hard_situations_other.trim() || null,
                episode_frequency: S.episode_frequency || '',
                episode_description: null,
                what_tried: null,
                wearable_willingness: S.wearable_willingness || '',
                logging_willingness: S.logging_willingness || '',
                valuable_outcomes: S.valuable_outcomes,
                valuable_outcomes_other: S.valuable_outcomes_other.trim() || null,
                payment_willingness: S.payment_willingness || '',
                beta_interest: S.beta_interest,
                additional_notes: (S.additional_notes.trim() || '') + (lang === 'zh' ? ' [zh]' : '') || null,
                source: new URLSearchParams(location.search).get('src') || null,
                consent: true,
            };
            if (S.child_age_range === 'multiple' && ages.length > 0) payload.children_ages = ages;

            const btn = document.getElementById('submit-btn');
            btn.disabled = true;

            const post = (row) => fetch(SUPABASE_URL + '/rest/v1/beta_waitlist', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'apikey': SUPABASE_ANON_KEY,
                    'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
                    'Prefer': 'return=minimal',
                },
                body: JSON.stringify(row),
            });

            try {
                let res = await post(payload);
                if (!res.ok && payload.children_ages) {
                    const fb = Object.assign({}, payload);
                    delete fb.children_ages;
                    fb.additional_notes = ((fb.additional_notes || '') + ' [children ages: ' + ages.join(', ') + ']').trim();
                    res = await post(fb);
                }
                if (!res.ok) throw new Error('insert failed');
                showSuccess();
            } catch (err) {
                console.error(err);
                showError(t('errSubmit'));
                btn.disabled = false;
            }
        });

        function showSuccess() {
            document.getElementById('beta-form').classList.add('hidden');
            document.getElementById('success').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        render();
